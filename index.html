<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satoshis dus depuis 13h</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .box {
      padding: 30px;
      border-radius: 20px;
      background: #1c1c1c;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      max-width: 700px;
      width: 100%;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .value {
      font-size: 4rem;
      font-weight: bold;
      margin: 20px 0;
      color: #f7931a;
    }

    .sub {
      font-size: 1.2rem;
      opacity: 0.85;
    }

    #credit {
      margin-top: 20px;
      font-size: 1.3rem;
      color: #00ff9c;
      font-weight: bold;
    }

    button {
      margin-top: 25px;
      padding: 12px 25px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #f7931a;
      color: black;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Retard depuis 13h</h1>

    <div class="value" id="sats">0</div>

    <div class="sub" id="details">
      0 seconde écoulée = 0 satoshi dû
    </div>

    <div id="credit">
      Montant dû par Sambasats ⚡️ à 🇨🇭 Vix18 : 0 sats
    </div>

    <button onclick="toggleCounter()" id="btn">
      ⏸️ Pause
    </button>
  </div>

  <script>
    const startDate = new Date("2026-04-19T13:00:00+02:00");

    let intervalId;
    let running = true;

    function updateCounter() {
      const now = new Date();

      const diffMs = now - startDate;
      const diffSeconds = Math.max(0, Math.floor(diffMs / 1000));
      const formatted = diffSeconds.toLocaleString("fr-CH");

      document.getElementById("sats").textContent = formatted;

      document.getElementById("details").textContent =
        `${formatted} seconde${diffSeconds > 1 ? "s" : ""} écoulée${diffSeconds > 1 ? "s" : ""} = ${formatted} satoshi${diffSeconds > 1 ? "s" : ""} dû${diffSeconds > 1 ? "s" : ""}`;

      document.getElementById("credit").textContent =
        `Montant dû par Sambasats ⚡️ à 🇨🇭 Vix18 : ${formatted} sats`;
    }

    function start() {
      intervalId = setInterval(updateCounter, 1000);
    }

    function stop() {
      clearInterval(intervalId);
    }

    function toggleCounter() {
      const btn = document.getElementById("btn");

      if (running) {
        stop();
        btn.textContent = "▶️ Reprendre";
        running = false;
      } else {
        start();
        btn.textContent = "⏸️ Pause";
        running = true;
      }
    }

    updateCounter();
    start();
  </script>

</body>
</html>
