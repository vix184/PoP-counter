<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satoshis dus depuis 13h</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .box {
      padding: 30px;
      border-radius: 20px;
      background: #1c1c1c;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      max-width: 700px;
      width: 100%;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .value {
      font-size: 4rem;
      font-weight: bold;
      margin: 20px 0;
      color: #f7931a;
      word-break: break-word;
    }

    .sub {
      font-size: 1.2rem;
      opacity: 0.85;
      line-height: 1.5;
    }

    #credit {
      margin-top: 20px;
      font-size: 1.3rem;
      color: #00ff9c;
      font-weight: bold;
      line-height: 1.5;
    }

    .wallet-section {
      margin-top: 30px;
      text-align: left;
    }

    .wallet-title {
      font-size: 1.1rem;
      margin-bottom: 10px;
      opacity: 0.95;
      text-align: center;
    }

    .wallet-shell {
      width: 100%;
      height: 34px;
      background: #2a2a2a;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .wallet-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f7931a, #ffb347);
      box-shadow: 0 0 12px rgba(247, 147, 26, 0.45);
    }

    .wallet-info {
      margin-top: 10px;
      font-size: 1rem;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      opacity: 0.9;
    }

    .controls {
      margin-top: 28px;
    }

    button {
      padding: 18px 35px;
      font-size: 1.3rem;
      border: none;
      border-radius: 14px;
      background: #f7931a;
      color: black;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .value {
        font-size: 3rem;
      }

      h1 {
        font-size: 1.6rem;
      }

      #credit {
        font-size: 1.1rem;
      }

      .wallet-info {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Retard depuis 13h</h1>

    <div class="value" id="sats">28 922</div>

    <div class="sub" id="details">
      🔥 Pop validé ! Dette figée.
    </div>

    <div id="credit">
      Montant dû par Sambasats ⚡ à 🇨🇭 Vix18 : 28 922 sats
    </div>

    <div class="wallet-section">
      <div class="wallet-title">Wallet de 🇨🇭Vix18</div>

      <div class="wallet-shell">
        <div class="wallet-fill" id="walletFill"></div>
      </div>

      <div class="wallet-info" id="walletInfo">
        28 922 / 100 000 sats (28.9%)
      </div>
    </div>

    <div class="controls">
      <button id="mainBtn">✅ Pop effectué</button>
    </div>
  </div>

  <script>
    const frozenValue = 28922;
    const walletGoal = 100000;
    const percent = Math.min((frozenValue / walletGoal) * 100, 100);

    document.getElementById("walletFill").style.width = percent + "%";
  </script>
</body>
</html>
