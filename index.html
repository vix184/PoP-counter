<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satoshis dus depuis 13h</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .box {
      padding: 30px;
      border-radius: 20px;
      background: #1c1c1c;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      max-width: 700px;
      width: 100%;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .value {
      font-size: 4rem;
      font-weight: bold;
      margin: 20px 0;
      color: #f7931a;
    }

    .sub {
      font-size: 1.2rem;
      opacity: 0.85;
    }

    #credit {
      margin-top: 20px;
      font-size: 1.3rem;
      color: #00ff9c;
      font-weight: bold;
    }

    .wallet-section {
      margin-top: 30px;
    }

    .wallet-title {
      margin-bottom: 10px;
    }

    .wallet-shell {
      width: 100%;
      height: 30px;
      background: #2a2a2a;
      border-radius: 999px;
      overflow: hidden;
    }

    .wallet-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f7931a, #ffb347);
      transition: width 0.5s;
    }

    .wallet-info {
      margin-top: 10px;
      font-size: 1rem;
    }

    .controls {
      margin-top: 30px;
    }

    button {
      padding: 18px 35px;
      font-size: 1.3rem;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: #f7931a;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="box">

    <h1>Retard depuis 13h</h1>

    <div class="value" id="sats">0</div>

    <div class="sub" id="details">
      0 seconde écoulée = 0 satoshi dû
    </div>

    <div id="credit">
      Montant dû par Sambasats ⚡️ à 🇨🇭 Vix18 : 0 sats
    </div>

    <div class="wallet-section">
      <div class="wallet-title">Wallet de 🇨🇭Vix18</div>

      <div class="wallet-shell">
        <div class="wallet-fill" id="walletFill"></div>
      </div>

      <div class="wallet-info" id="walletInfo">
        0 / 100’000 sats (0%)
      </div>
    </div>

    <div class="controls">
      <button onclick="handlePop()" id="mainBtn">
        🎯 Pop
      </button>
    </div>

  </div>

  <script>
    const startDate = new Date("2026-04-19T13:00:00+02:00");
    const walletGoal = 100000;

    let intervalId;
    let frozenValue = null;
    let finished = false;

    function updateCounter() {
      let diffSeconds;

      if (frozenValue !== null) {
        diffSeconds = frozenValue;
      } else {
        const now = new Date();
        diffSeconds = Math.max(0, Math.floor((now - startDate) / 1000));
      }

      const formatted = diffSeconds.toLocaleString("fr-CH");
      const percent = Math.min((diffSeconds / walletGoal) * 100, 100);

      document.getElementById("sats").textContent = formatted;

      document.getElementById("details").textContent =
        frozenValue !== null
          ? "🔥 Pop validé ! Dette figée."
          : `${formatted} seconde(s) écoulée(s) = ${formatted} satoshis dûs`;

      document.getElementById("credit").textContent =
        `Montant dû par Sambasats ⚡️ à 🇨🇭 Vix18 : ${formatted} sats`;

      document.getElementById("walletFill").style.width = percent + "%";

      document.getElementById("walletInfo").textContent =
        `${formatted} / ${walletGoal.toLocaleString("fr-CH")} sats (${percent.toFixed(1)}%)`;
    }

    function handlePop() {
      if (finished) return;

      const now = new Date();
      frozenValue = Math.max(0, Math.floor((now - startDate) / 1000));

      clearInterval(intervalId);
      updateCounter();

      document.getElementById("mainBtn").textContent = "✅ Pop effectué";

      finished = true;
    }

    updateCounter();
    intervalId = setInterval(updateCounter, 1000);
  </script>

</body>
</html>
